<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main prompt: test - Stub Site</title>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrapper {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4338ca;
      background: #eef2ff;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 42px);
    }
    p {
      margin: 0 0 24px;
      color: #475569;
      line-height: 1.6;
    }
    a.button {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: #ffffff;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <section class="card">
      <span class="badge">Local Stub Mode</span>
      <h1>Welcome to Main prompt: test</h1>

<div style="text-align:center;padding:1.5rem 1rem;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:0.75rem;color:#999;border-top:1px solid rgba(128,128,128,0.15);margin-top:3rem;">

</div>

</html>
